# CI/CD for k8s workloads on the Hetzner VPS (k3s cluster).
# Tooling (pulumi, node, just) comes from the repo's Nix flake devShell.
#
# Triggers:
#   PR   -> pulumi preview (dry-run, no changes applied)
#   push -> pulumi up      (apply changes to the cluster)
#
# Required GitHub repo secrets:
#   PULUMI_ACCESS_TOKEN  -- authenticates with Pulumi Cloud + decrypts stack secrets
#   KUBECONFIG           -- k3s kubeconfig (server URL must point to the VPS, not 127.0.0.1)

name: Deploy VPS workloads

on:
  push:
    branches: [main]
    paths:
      - "vps/**"
      - ".github/workflows/vps-deploy.yaml"
  pull_request:
    branches: [main]
    paths:
      - "vps/**"
      - ".github/workflows/vps-deploy.yaml"

permissions:
  contents: read
  pull-requests: write

env:
  PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}

jobs:
  deploy:
    name: Pulumi ${{ github.event_name == 'pull_request' && 'Preview' || 'Up' }}
    runs-on: ubuntu-latest
    # All run steps execute inside the Nix devShell (pulumi, node, just available).
    defaults:
      run:
        shell: nix develop --command bash -e {0}
    steps:
      - uses: actions/checkout@v4

      # Install Nix with flakes enabled.
      - uses: DeterminateSystems/nix-installer-action@main

      # Cache Nix store between runs (GitHub Actions cache, no FlakeHub account needed).
      - uses: DeterminateSystems/magic-nix-cache-action@main
        with:
          use-flakehub: false

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Install dependencies
        run: just vps bootstrap

      # PR: preview only -- shows what would change without applying.
      - name: Pulumi preview
        if: github.event_name == 'pull_request'
        run: just vps preview

      # Push to main: apply changes to the cluster.
      - name: Pulumi up
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: just vps deploy
