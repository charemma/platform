apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tailscale-operator
  namespace: argocd
spec:
  project: default
  source:
    chart: tailscale-operator
    repoURL: https://pkgs.tailscale.com/helmcharts
    targetRevision: "*"
    helm:
      values: |
        operatorConfig:
          hostname: "k8s-operator"
        # OAuth credentials are in the pre-created operator-oauth secret
        # in the tailscale namespace. The operator picks it up automatically.
  destination:
    server: https://kubernetes.default.svc
    namespace: tailscale
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
