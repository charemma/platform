apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tetragon
  namespace: argocd
spec:
  project: default
  source:
    chart: tetragon
    repoURL: https://helm.cilium.io
    targetRevision: 1.7.0
    helm:
      values: |
        # Metrics endpoint is enabled by default. The ServiceMonitor is picked up
        # by kube-prometheus-stack running in the monitoring namespace.
        # Tight limits so the DaemonSet fits on a 4GB vps alongside
        # k3s + kube-prometheus + argocd. Steady-state usage with a
        # handful of tracing policies is well below 256Mi.
        tetragon:
          # Exclude arm64 nodes (aiagent RPi5). Tetragon's BPF ring buffer is hardcoded
          # to 4KiB which does not align with the RPi5 kernel's 16KiB page size, causing
          # the base sensor to fail loading. Revisit once tetragon supports 16K pages
          # or the RPi kernel is rebuilt with 4K pages.
          daemonSetOverrides:
            affinity:
              nodeAffinity:
                requiredDuringSchedulingIgnoredDuringExecution:
                  nodeSelectorTerms:
                    - matchExpressions:
                        - key: kubernetes.io/arch
                          operator: In
                          values: ["amd64"]
          prometheus:
            serviceMonitor:
              enabled: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi
        tetragonOperator:
          prometheus:
            serviceMonitor:
              enabled: true
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
            limits:
              memory: 96Mi
        # export-stdout sidecar (top-level, not under tetragon).
        export:
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
            limits:
              memory: 96Mi
        # export mode defaults to "stdout" -- JSON events land on the
        # export-stdout sidecar. A future Loki + alloy setup will ship these.
  destination:
    server: https://kubernetes.default.svc
    namespace: tetragon
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
