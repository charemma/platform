apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: attic
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/charemma/platform
    targetRevision: HEAD
    path: gitops/manifests/attic
  destination:
    server: https://kubernetes.default.svc
    namespace: attic
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
