apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ntfy
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/charemma/platform
    targetRevision: HEAD
    path: gitops/manifests/ntfy
  destination:
    server: https://kubernetes.default.svc
    namespace: ntfy
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
