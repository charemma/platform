apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd
spec:
  project: default
  source:
    chart: kube-prometheus-stack
    repoURL: https://prometheus-community.github.io/helm-charts
    targetRevision: 67.3.0
    helm:
      values: |
        grafana:
          admin:
            existingSecret: grafana-admin
            userKey: username
            passwordKey: password
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 128Mi
          ingress:
            enabled: true
            annotations:
              traefik.ingress.kubernetes.io/router.entrypoints: websecure
              traefik.ingress.kubernetes.io/router.tls.certresolver: letsencrypt
            hosts:
              - monitoring.charemma.de
            tls:
              - hosts:
                  - monitoring.charemma.de

        prometheus:
          prometheusSpec:
            # 4GB vps needs prometheus under 300MB to leave room for k3s + argocd + tetragon.
            retention: 2d
            resources:
              requests:
                memory: 192Mi
              limits:
                memory: 320Mi
            additionalScrapeConfigs:
              - job_name: node
                static_configs:
                  - targets:
                      - localhost:9100
                      - aiagent.tail48929d.ts.net:9100
                      - north.tail48929d.ts.net:9100
                scrape_interval: 60s
              - job_name: airdata-particulate
                static_configs:
                  - targets:
                      - aiagent.tail48929d.ts.net:8000
                scrape_interval: 60s
        prometheusOperator:
          admissionWebhooks:
            enabled: false
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
            limits:
              memory: 64Mi

        # Disable everything we don't need
        alertmanager:
          enabled: false
        nodeExporter:
          enabled: false
        kubeStateMetrics:
          enabled: false
        defaultRules:
          create: false
        kubeApiServer:
          enabled: false
        kubeControllerManager:
          enabled: false
        kubeScheduler:
          enabled: false
        kubeProxy:
          enabled: false
        kubelet:
          enabled: false
        kubeEtcd:
          enabled: false
        coreDns:
          enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
