apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd
spec:
  project: default
  source:
    chart: kube-prometheus-stack
    repoURL: https://prometheus-community.github.io/helm-charts
    targetRevision: 67.3.0
    helm:
      values: |
        grafana:
          admin:
            existingSecret: grafana-admin
            userKey: username
            passwordKey: password
          # PVC so user prefs, alerts, and any locally-created dashboards survive pod restarts.
          # Canonical dashboards should be provisioned via ConfigMaps (grafana_dashboard=1 label)
          # so they live in git and survive PVC loss.
          persistence:
            enabled: true
            storageClassName: local-path
            size: 1Gi
          sidecar:
            dashboards:
              enabled: true
              label: grafana_dashboard
              labelValue: "1"
              searchNamespace: ALL
              folderAnnotation: grafana_folder
              provider:
                foldersFromFilesStructure: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 128Mi
          ingress:
            enabled: true
            annotations:
              traefik.ingress.kubernetes.io/router.entrypoints: websecure
              traefik.ingress.kubernetes.io/router.tls.certresolver: letsencrypt
            hosts:
              - monitoring.charemma.de
            tls:
              - hosts:
                  - monitoring.charemma.de

        prometheus:
          prometheusSpec:
            # 4GB vps needs prometheus under 300MB in-memory. Retention is disk-based (PVC),
            # so 7d does not blow up RAM as long as the active series count stays low.
            retention: 7d
            resources:
              requests:
                memory: 192Mi
              limits:
                memory: 320Mi
            # PVC on k3s local-path-provisioner so metrics history survives pod restart.
            storageSpec:
              volumeClaimTemplate:
                spec:
                  storageClassName: local-path
                  accessModes: ["ReadWriteOnce"]
                  resources:
                    requests:
                      storage: 5Gi
        prometheusOperator:
          admissionWebhooks:
            enabled: false
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
            limits:
              memory: 64Mi

        # Node-exporter DaemonSet on every node. Tolerations let it land on
        # aiagent despite its dedicated=home:NoSchedule taint, so we get
        # node_boot_time_seconds and up{} for kitchen power-outage tracking.
        prometheus-node-exporter:
          tolerations:
            - operator: Exists
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
            limits:
              memory: 64Mi

        # Disable everything we do not need
        alertmanager:
          enabled: false
        kubeStateMetrics:
          enabled: false
        defaultRules:
          create: false
        kubeApiServer:
          enabled: false
        kubeControllerManager:
          enabled: false
        kubeScheduler:
          enabled: false
        kubeProxy:
          enabled: false
        kubelet:
          enabled: false
        kubeEtcd:
          enabled: false
        coreDns:
          enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
