apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: zeddl
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/charemma/zeddl
    targetRevision: HEAD
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: zeddl
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
