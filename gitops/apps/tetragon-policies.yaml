apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tetragon-policies
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/charemma/infra
    targetRevision: HEAD
    path: gitops/manifests/tetragon-policies
  destination:
    server: https://kubernetes.default.svc
    namespace: tetragon
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
