apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-image-updater
  namespace: argocd
spec:
  project: default
  source:
    chart: argocd-image-updater
    repoURL: https://argoproj.github.io/argo-helm
    targetRevision: "*"
    helm:
      values: |
        config:
          # Register ghcr.io so private images can be polled for new tags.
          # Token lives in the ghcr-image-updater secret (argocd namespace);
          # see zeddl/docs/deployment-secrets.md for creation.
          registries:
            - name: GitHub Container Registry
              api_url: https://ghcr.io
              prefix: ghcr.io
              ping: yes
              credentials: secret:argocd/ghcr-image-updater#token
              credsexpire: 0
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
