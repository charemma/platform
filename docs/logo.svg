<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="platform">
  <title>platform</title>
  <!-- Badge ring -->
  <circle cx="60" cy="60" r="54" fill="none" stroke="currentColor" stroke-width="4"/>
  <!-- Conway's Glider, the hacker emblem (catb.org/hacker-emblem/) -->
  <g fill="currentColor" transform="translate(36 36)">
    <rect x="18" y="0"  width="12" height="12"/>
    <rect x="36" y="18" width="12" height="12"/>
    <rect x="0"  y="36" width="12" height="12"/>
    <rect x="18" y="36" width="12" height="12"/>
    <rect x="36" y="36" width="12" height="12"/>
  </g>
</svg>
